# Kitty config — ported from alacritty.toml (kanagawa wave palette).

# ── Font ──────────────────────────────────────────────────────────────────
# Matches alacritty: normal=Thin, bold=Regular, italic=Thin Italic.
font_family      family="JetBrainsMono Nerd Font Mono" style="Thin"
bold_font        family="JetBrainsMono Nerd Font Mono" style="Regular"
italic_font      family="JetBrainsMono Nerd Font Mono" style="Thin Italic"
bold_italic_font family="JetBrainsMono Nerd Font Mono" style="Italic"
font_size        22.0

# Route Hangul ranges to D2Coding (monospace Korean font) so Korean text aligns
# cleanly instead of falling back to a non-monospace system font.
# Covers: Hangul Jamo, Compatibility Jamo, Jamo Extended-A/B, Syllables.
symbol_map U+1100-U+11FF,U+3130-U+318F,U+A960-U+A97F,U+AC00-U+D7A3,U+D7B0-U+D7FF D2Coding

# ── macOS keys ────────────────────────────────────────────────────────────
# Treat Option as Alt so <A-h/j/k/l> reach nvim and ESC-word-nav reaches zsh.
# This replaces alacritty's explicit Alt+<letter> -> ESC+<letter> bindings.
macos_option_as_alt yes

# ── Terminal / behavior ───────────────────────────────────────────────────
# Keep xterm-256color (as alacritty did) so remote hosts without kitty's
# terminfo don't choke over ssh. Kitty's keyboard protocol still works.
term xterm-256color

# OSC52 clipboard read + write (alacritty had osc52 = "CopyPaste").
clipboard_control write-clipboard write-primary read-clipboard read-primary

enable_audio_bell    no
window_padding_width 0
confirm_os_window_close 0
# Kitty composes NFD (decomposed) CJK better than alacritty — Korean filenames
# from macOS render as proper syllable blocks.

# ── Keybindings ───────────────────────────────────────────────────────────
# alacritty: Super+Return -> ToggleSimpleFullscreen. `traditional` fullscreen
# fills the current screen instead of spawning a new macOS Space/desktop.
macos_traditional_fullscreen yes
map cmd+enter toggle_fullscreen

# ── Colors: kanagawa (wave) ───────────────────────────────────────────────
foreground           #DCD7BA
background           #1F1F28
selection_foreground #C8C093
selection_background #2D4F67
cursor               #C8C093
cursor_text_color    #1F1F28

# normal
color0  #090618
color1  #C34043
color2  #76946A
color3  #C0A36E
color4  #7E9CD8
color5  #957FB8
color6  #6A9589
color7  #C8C093
# bright
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E6C384
color12 #7FB4CA
