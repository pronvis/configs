# set scroll history to 100,000 lines
set-option -g history-limit 100000

# modern colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,alacritty:RGB"

# unbind the prefix and bind it to Ctrl-a like screen
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# copy to macOS clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy'
# H/L jump to start/end of line (default is top/bottom of screen)
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi Enter send-keys -X cancel
bind -T copy-mode-vi escape send-keys -X cancel

# ctrl-] to clean history
bind -n C-] clear-history

# Avoid ESC delay
set -s escape-time 0

# Keep the macOS terminal title stable instead of mirroring app-controlled pane titles.
set -g set-titles on
set -g set-titles-string "#S:#I.#P"
set-window-option -g allow-rename off
set-window-option -g automatic-rename off

# VIM mode
set -g mode-keys vi

# Mouse friendly
set -g mouse on

# do not reset scroll on mouse selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# switch to marked pane
bind Q switch-client -t'{marked}'

# split panes using | and -
# and open in current directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# move current window left/right in the session (repeatable: prefix then < < <)
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# use fzf to choose session
bind-key S split-window -v "tmux resize-pane -Z; \
 selected_session=\$(tmux list-sessions -F '#S' | fzf --reverse --exit-0); \
 [ -n \"\$selected_session\" ] && tmux switch-client -t \"\$selected_session\""

# command to open new sessions in current directory:
# :attach-session -t . -c '#{pane_current_path}'

######################
### DESIGN CHANGES ###
######################

set -g allow-passthrough on

# -- Status bar: kanagawa + powerline separators + Nerd Font icons --
set -g status-style bg='#16161D'
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 90

# Left: session block with a powerline cap.
set -g status-left "#[fg=#E6C384,bg=#7E9CD8,bold] \U000F0CED #[fg=#16161D,bold]#S#[fg=#E6C384] \U000F0CED #[fg=#7E9CD8,bg=#16161D,nobold]Ņé┤"

# Windows: inactive dim; active as a yellow powerline pill.
set -g window-status-separator ''
set-window-option -g window-status-style 'fg=#727169,bg=#16161D'
set-window-option -g window-status-format ' #I #W#F '
set-window-option -g window-status-current-format "#[fg=#E6C384,bg=#16161D]ŅéČ#[fg=#16161D,bg=#E6C384,bold] #I #W#F #[fg=#E6C384,bg=#16161D,nobold]Ņé┤"

# Right: date + local time as powerline blocks.
set -g status-right "#[fg=#7AA89F,bg=#16161D]ŅéČ#[fg=#16161D,bg=#7AA89F] ’ü│ %A, %d %b(%m) %Y #[fg=#7E9CD8,bg=#7AA89F]ŅéČ#[fg=#16161D,bg=#7E9CD8] ’ĆŚ %H:%M #[fg=#957FB8,bg=#7E9CD8]ŅéČ#[fg=#16161D,bg=#957FB8] ’é¼ UTC #(date -u +%%H:%%M) "

# Copy-mode selection + position/search indicator.
set -g mode-style 'fg=#C8C093,bg=#2D4F67'

# Command prompt (prefix + :) and status messages.
set -g message-style 'fg=#DCD7BA,bg=#2D4F67'
set -g message-command-style 'fg=#DCD7BA,bg=#2D4F67'

# Pane borders ŌĆö active pane border in kanagawa crystalBlue, inactive dimmed.
set -g pane-border-style fg='#363646'
set -g pane-active-border-style fg='#7E9CD8'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'RyanMillerC/better-vim-tmux-resizer'
# dont like how it sets options for 'window-status-style'
# set -g @plugin 'tinted-theming/base16-tmux'

# =========================================
# === resize and moving in vim and tmux ===
# copypasted from 'RyanMillerC/better-vim-tmux-resizer'
# =========================================
#
# Smart pane resizing with awareness of Vim splits.
# See: https://github.com/RyanMillerC/better-vim-tmux-resizer
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Edit values if you use custom resize_count variables

bind-key -n ╦Ö if-shell "$is_vim" "send-keys ╦Ö"  "resize-pane -L 10"
bind-key -n Ōłå if-shell "$is_vim" "send-keys Ōłå"  "resize-pane -D 5"
bind-key -n ╦Ü if-shell "$is_vim" "send-keys ╦Ü"  "resize-pane -U 5"
bind-key -n ┬¼ if-shell "$is_vim" "send-keys ┬¼"  "resize-pane -R 10"

bind-key -T copy-mode-vi ╦Ö resize-pane -L 10
bind-key -T copy-mode-vi Ōłå resize-pane -D 5
bind-key -T copy-mode-vi ╦Ü resize-pane -U 5
bind-key -T copy-mode-vi ┬¼ resize-pane -R 10

# =========================================

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
