# Lightweight tmux.conf for remote servers.
#
# Differences vs the full local config:
#   - No tpm / plugins (resurrect, continuum, tmux-navigator pulled via vim only)
#   - No pbcopy binding (mac-only); OSC52 instead so the laptop terminal
#     receives copied text over the SSH session
#   - No alacritty-specific terminal-features

# 100k-line scrollback
set-option -g history-limit 100000

# Modern colors. tmux-256color is what every modern terminal speaks.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# C-b as prefix (by default)

# vi keys in copy mode
set -g mode-keys vi

# Mouse on; don't lose selection when mouse-up
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy to the *laptop* clipboard via OSC52. tmux's native `set-clipboard`
# emission does not work through this nested-tmux-over-SSH setup, so — exactly
# like lite/nvim/init.lua — we emit OSC52 ourselves, double-wrapped in tmux DCS
# passthrough (one strip per tmux layer), written to the pane's tty. Keep
# set-clipboard off so tmux doesn't also fire its own (broken) emission.
set -g set-clipboard off
bind -T copy-mode-vi v send -X begin-selection
# H/L jump to start/end of line (default is top/bottom of screen)
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "bash ~/.tmux-osc52.sh #{pane_tty}"
bind -T copy-mode-vi Enter send-keys -X cancel
bind -T copy-mode-vi escape send-keys -X cancel

# C-] clears scrollback
bind -n C-] clear-history

# No ESC delay (matters for vim)
set -s escape-time 0

# Stable terminal title; don't let apps rename windows behind our back
set -g set-titles on
set -g set-titles-string "#S:#I.#P"
set-window-option -g allow-rename off
set-window-option -g automatic-rename off

# Switch to marked pane
bind Q switch-client -t'{marked}'

# Splits open in the current pane's directory
bind c new-window      -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# DCS passthrough so nvim's OSC 52 (wrapped by lite/nvim/init.lua) survives
# tmux. On 3.2a this was implicitly on; 3.3+ requires the explicit opt-in.
# `-q` makes 3.2a silently ignore the unknown option.
set -gq allow-passthrough on

# Status bar — same layout as the full config but with no UTC field (which
# depends on `date -u` formatting that varies by GNU/BSD).
set -g status-left-length 60
set -g status-right-length 60
set -g status-bg color18
set -g status-right "#[fg=color7]%A, %d %b(%m) %Y #[fg=color16]: #[fg=color04]%H:%M "

set-window-option -g window-status-style fg=color04
set-window-option -g window-status-current-style fg=color03,bold
set-window-option -g status-left ' #[fg=color03,bold]☩ #[fg=color14]#S#[fg=color03] ☩ '
set -g status-justify centre
set-window-option -g window-status-format '#W[#I]#F'
set-window-option -g window-status-current-format '#W#F'
set -g window-status-separator ' #[fg=color19]#[default] '
